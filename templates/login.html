<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            margin-top: 100px;
            border-radius: 10px;
        }

        input,
        button {
            margin: 10px;
            padding: 10px;
            width: 90%;
        }
    </style>
</head>

<body>
    {% extends "base.html" %}
    {% block content %}

    <div class="card p-4 mx-auto" style="max-width:400px;">
        <h3 class="text-center">Login</h3>

        <form action="/login_check" method="post">
            <input class="form-control mb-2" name="username" placeholder="Username" required>
            <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>
            <button class="btn btn-primary w-100">Login</button>
        </form>

        <a href="/signup" class="text-center mt-2">Create Account</a>
    </div>

    {% endblock %}
</body>

</html>
